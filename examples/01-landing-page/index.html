<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>我的产品 — 落地页示例</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#050510;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.hero{max-width:700px;margin:0 auto;padding:100px 24px 60px;text-align:center}
h1{font-size:clamp(36px,6vw,64px);font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,#fff,#c4b5fd,#67e8f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:20px}
p{color:#94a3b8;font-size:18px;line-height:1.7;margin-bottom:40px}
.btn{display:inline-block;padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,#8b5cf6,#d946ef);color:#fff;font-size:16px;font-weight:600;text-decoration:none;box-shadow:0 0 40px rgba(139,92,246,.4)}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;max-width:700px;margin:60px auto;padding:0 24px}
.feat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px}
.feat h3{font-size:15px;margin-bottom:8px}
.feat p{font-size:13px;color:#64748b;line-height:1.6}
</style>
</head>
<body>
<div class="hero">
  <h1>你的产品名称</h1>
  <p>一句话描述你的产品价值。让访客在 5 秒内明白这个产品是做什么的，能解决什么问题。</p>
  <a class="btn" href="#">立即开始 →</a>
</div>
<div class="features">
  <div class="feat"><h3>⚡ 特性一</h3><p>简洁描述这个特性带来的价值，而不是技术细节。</p></div>
  <div class="feat"><h3>🔒 特性二</h3><p>用用户能理解的语言描述，避免技术术语。</p></div>
  <div class="feat"><h3>🚀 特性三</h3><p>聚焦结果和收益，而非实现方式。</p></div>
</div>
</body>
</html>
